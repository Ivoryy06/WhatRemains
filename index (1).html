<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kenangan Akhir Tahun</title>

<!-- Cropper.js CSS -->
<link href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INPUT CARD -->
<div class="card">
  <div class="profile">
    <div class="avatar" id="avatarPreview">👤</div>
    <label for="avatarInput" class="file-btn">Upload Profil</label>
    <input type="file" id="avatarInput" accept="image/*">
  </div>

  <input id="nama" placeholder="Nama">
  <input id="kelas" placeholder="Kelas">
  <input id="tahun" placeholder="Tahun Kelulusan">
  <input id="impian" placeholder="Impian setelah lulus">
  <textarea id="kenang" placeholder="Kenangan paling berarti"></textarea>
  <div class="char-counter"><span id="kenangCount">0</span>/300</div>

  <textarea id="pesan" placeholder="Pesan untuk diri sendiri"></textarea>
  <div class="char-counter"><span id="pesanCount">0</span>/300</div>

  <button id="saveBtn">Simpan Kenangan</button>
  <button id="downloadBtn" style="margin-top:10px">📥 Download Kenangan</button>

  <label for="images" class="file-btn" style="margin-top:15px">📸 Tambah Foto Kenangan</label>
  <input type="file" id="images" multiple accept="image/*">

  <div style="margin-top:15px;text-align:center;">
    <input type="text" id="gradientInput" placeholder="linear-gradient(135deg,#0f2027,#203a43)">
    <button id="gradientBtn" style="width:auto;margin-top:10px">Apply Background</button>
  </div>

  <div id="congrats"></div>
</div>

<!-- RESULT -->
<div class="card result" id="resultCard">
  <p>Nama saya <b id="outNama"></b> dari kelas <b id="outKelas"></b>. Tahun <b id="outTahun"></b> menjadi penutup satu perjalanan.</p>
  <p>Setelah lulus, saya bermimpi menjadi <b id="outImpian"></b>.</p>
  <p><b>Kenangan:</b></p>
  <p id="outKenang"></p>
  <p><b>Pesan untuk diri saya:</b></p>
  <blockquote id="outPesan"></blockquote>
</div>

<!-- GALLERY -->
<div class="card">
  <h3>Galeri Kenangan</h3>
  <div id="gallery" class="gallery"></div>
</div>

<!-- CROP MODAL -->
<div id="cropModal">
  <div id="cropContent">
    <h3>Crop Profil</h3>
    <img id="cropImage" style="max-width:100%">
    <div style="margin-top:10px">
      <button id="cropConfirm">Simpan</button>
      <button id="cropCancel">Batal</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="script.js"></script>
</body>
</html>
