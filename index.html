<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Remains</title>
  <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="toast"></div>

  <header>
    <h1>What Remains</h1>
    <p class="subtitle">A keepsake for the year that shaped you.</p>
    <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">🌙</button>
  </header>

  <!-- INPUT CARD -->
  <div class="card">
    <div class="profile">
      <div class="avatar" id="avatarPreview">👤</div>
      <label for="avatarInput" class="file-btn">Upload Photo</label>
      <input type="file" id="avatarInput" accept="image/*">
    </div>

    <div class="field-group">
      <label>Full Name</label>
      <input id="nama" placeholder="e.g. Alex Rivera">
    </div>
    <div class="field-row">
      <div class="field-group">
        <label>Class</label>
        <input id="kelas" placeholder="e.g. 12-A">
      </div>
      <div class="field-group">
        <label>Graduation Year</label>
        <input id="tahun" placeholder="e.g. 2026">
      </div>
    </div>
    <div class="field-group">
      <label>Dream after graduation</label>
      <input id="impian" placeholder="e.g. Software engineer">
    </div>

    <div class="field-group">
      <label>Most meaningful memory <span class="char-counter"><span id="kenangCount">0</span>/300</span></label>
      <textarea id="kenang" placeholder="Write about a moment you'll never forget…" maxlength="300"></textarea>
    </div>

    <div class="field-group">
      <label>Message to your future self <span class="char-counter"><span id="pesanCount">0</span>/300</span></label>
      <textarea id="pesan" placeholder="What do you want to remember?" maxlength="300"></textarea>
    </div>

    <div class="btn-row">
      <button id="saveBtn">💾 Save</button>
      <button id="downloadBtn" class="btn-secondary">📥 Download Card</button>
    </div>
    <div class="btn-row" style="margin-top:10px">
      <button id="shareBtn" class="btn-secondary">🔗 Share Card</button>
      <button id="exportBtn" class="btn-secondary">📤 Export Backup</button>
    </div>
    <div style="margin-top:10px">
      <label for="importFile" class="file-btn-sm" style="width:100%;text-align:center;display:block">📥 Import Backup</label>
      <input type="file" id="importFile" accept=".json">
    </div>

    <details class="collapsible">
      <summary>🎨 Customize Background</summary>
      <div class="collapsible-body">
        <div class="preset-swatches" id="presetSwatches"></div>
        <div class="field-row" style="margin-top:10px">
          <input id="gradientInput" placeholder="e.g. linear-gradient(135deg,#0f2027,#2c5364)">
          <button id="gradientBtn" class="btn-sm">Apply</button>
        </div>
        <button id="resetBgBtn" class="btn-ghost">Reset to default</button>
      </div>
    </details>
  </div>

  <!-- RESULT CARD -->
  <div class="card result" id="resultCard">
    <div class="result-header">
      <div class="result-avatar" id="resultAvatar"></div>
      <div>
        <h2 id="outNama"></h2>
        <span class="tag" id="outKelas"></span>
        <span class="tag" id="outTahun"></span>
      </div>
    </div>
    <p>Dreaming of becoming <b id="outImpian"></b>.</p>
    <div class="result-section">
      <p class="section-label">Most meaningful memory</p>
      <p id="outKenang"></p>
    </div>
    <div class="result-section">
      <p class="section-label">To my future self</p>
      <blockquote id="outPesan"></blockquote>
    </div>
    <div class="result-section" id="quoteSection">
      <p class="section-label">Quote of the day</p>
      <blockquote id="quoteText"></blockquote>
    </div>
  </div>

  <!-- GALLERY -->
  <div class="card">
    <div class="card-header">
      <h3>Memory Gallery</h3>
      <label for="images" class="file-btn-sm">+ Add Photos</label>
      <input type="file" id="images" multiple accept="image/*">
    </div>
    <div id="gallery" class="gallery"></div>
  </div>

  <!-- DANGER ZONE -->
  <div class="card danger-card">
    <button id="clearBtn" class="btn-danger">🗑 Clear All Data</button>
  </div>

  <!-- CROP MODAL -->
  <div id="cropModal">
    <div id="cropContent">
      <h3>Crop Profile Photo</h3>
      <img id="cropImage">
      <div class="crop-actions">
        <button id="cropConfirm">Save</button>
        <button id="cropCancel" class="btn-ghost-dark">Cancel</button>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox">
    <button id="lightboxClose" aria-label="Close">✕</button>
    <img id="lightboxImg" alt="Full size memory photo">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
